services:

  # ── INFRASTRUCTURE ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: drift_triage
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # creates mlflow DB on first boot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d drift_triage"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10


  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${POSTGRES_USER:-drift}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri $$MLFLOW_BACKEND_STORE_URI
        --default-artifact-root $$MLFLOW_ARTIFACT_ROOT"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── TRAINER (runs once, exits 0) ─────────────────────────────────────────────

  trainer:
    build:
      context: ./backend/trainer
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-drift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: drift_triage
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: "no"

  # ── PLATFORM (teammate's service) ────────────────────────────────────────────

  platform:
    build:
      context: ./backend/platform
    ports:
      - "8001:8001"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-drift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: drift_triage
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AGENT_URL: http://agent:8002
      AGENT_API_KEY: ${AGENT_API_KEY}
      DRIFT_WINDOW_SIZE: ${DRIFT_WINDOW_SIZE:-500}
      DRIFT_PSI_THRESHOLD_HIGH: ${DRIFT_PSI_THRESHOLD_HIGH:-0.2}
      DRIFT_PSI_THRESHOLD_CRITICAL: ${DRIFT_PSI_THRESHOLD_CRITICAL:-0.25}
    depends_on:
      trainer:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── AGENT (your service) ─────────────────────────────────────────────────────

  agent:
    build:
      context: ./backend/agent
    ports:
      - "8002:8002"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-drift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: drift_triage
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PLATFORM_URL: http://platform:8001
      MLFLOW_TRACKING_URI: http://mlflow:5000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      AGENT_API_KEY: ${AGENT_API_KEY}
      EMERGENCY_BYPASS_KEY: ${EMERGENCY_BYPASS_KEY}
      APPROVAL_TIMEOUT_MINUTES: ${APPROVAL_TIMEOUT_MINUTES:-10}
    depends_on:
      platform:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── WORKER ───────────────────────────────────────────────────────────────────

  worker:
    build:
      context: ./backend/worker
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-drift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: drift_triage
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PLATFORM_URL: http://platform:8001
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      platform:
        condition: service_healthy

  # ── DASHBOARD ────────────────────────────────────────────────────────────────

  dashboard:
    build:
      context: ./frontend/dashboard
    ports:
      - "8501:8501"
    environment:
      PLATFORM_URL: http://platform:8001
      AGENT_URL: http://agent:8002
      AGENT_HIL_POLL_INTERVAL: ${AGENT_HIL_POLL_INTERVAL:-2}
    depends_on:
      platform:
        condition: service_healthy
      agent:
        condition: service_healthy

# ── VOLUMES ────────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  mlflow_artifacts:
